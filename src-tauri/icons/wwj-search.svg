  <!-- 较长手柄 -->
  <line x1="315" y1="325" x2="390" y2="400" stroke="#1e40af" stroke-width="30" stroke-linecap="round"/>

  <!-- W字母 - 在放大镜内部 -->
  <path d="M150 180
           L185 280
           L220 210
           L255 280
           L290 180"
        fill="none"
        stroke="#3b82f6"
        stroke-width="26"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- 橙色高亮 -->
  <circle cx="220" cy="230" r="14" fill="#f97316"/>
</svg>